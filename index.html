<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fortress 2 - Fix Update</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; }
        canvas { display: block; }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            pointer-events: none;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        #game-info {
            background: rgba(0,0,0,0.7);
            padding: 5px 20px;
            border-radius: 20px;
            border: 2px solid #ffcc00;
            font-size: 1.2em;
            font-weight: bold;
        }

        .hud {
            position: absolute;
            bottom: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 15px;
            color: white;
            border: 3px solid #555;
            min-width: 200px;
            transition: all 0.3s;
        }
        #p1-hud { left: 20px; border-color: #ff4444; box-shadow: 0 0 15px rgba(255,68,68,0.4); }
        #p2-hud { right: 20px; border-color: #4444ff; box-shadow: 0 0 15px rgba(68,68,255,0.4); }

        .hp-bar-container {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid #000;
        }
        .hp-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            transition: width 0.3s ease-out;
        }

        .weapon-info {
            font-size: 0.9em;
            color: #ccc;
            margin-top: 5px;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .menu-panel {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            max-width: 900px;
        }

        .selection-group {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 2px solid transparent;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background: #555; transform: translateY(-2px); }
        .btn.selected { border-color: #ffcc00; background: #5d4e00; }

        .start-btn {
            margin-top: 30px;
            padding: 20px 60px;
            font-size: 1.5em;
            background: #e67e22;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(230,126,34,0.4);
        }
        .start-btn:hover { background: #d35400; transform: scale(1.05); }

        .split-line {
            position: absolute;
            left: 50%; top: 0; width: 6px; height: 100%;
            background: #111;
            z-index: 5;
            box-shadow: 0 0 10px rgba(0,0,0,1);
        }

        h1 { font-size: 4em; margin-bottom: 10px; color: #ffcc00; text-shadow: 4px 4px 0px #d35400; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="game-info">Objective: Capture the Milk Bowl!</div>
        <div id="fps-counter" style="font-family:monospace; font-size: 0.8em; color: #0f0;">FPS: 60</div>
    </div>

    <div id="p1-hud" class="hud" style="display:none">
        <div style="font-size:1.4em">Player 1: <span id="p1-class-name">...</span></div>
        <div class="hp-bar-container"><div id="p1-hp-bar" class="hp-bar"></div></div>
        <div class="weapon-info">Weapon: <span id="p1-weapon">Primary</span></div>
        <div style="font-size:0.8em; margin-top:5px; color:#aaa">Score: <span id="p1-score">0</span></div>
    </div>

    <div id="p2-hud" class="hud" style="display:none">
        <div style="font-size:1.4em">Player 2: <span id="p2-class-name">...</span></div>
        <div class="hp-bar-container"><div id="p2-hp-bar" class="hp-bar"></div></div>
        <div class="weapon-info">Weapon: <span id="p2-weapon">Primary</span></div>
        <div style="font-size:0.8em; margin-top:5px; color:#aaa">Score: <span id="p2-score">0</span></div>
    </div>

    <div id="start-screen">
        <div class="menu-panel">
            <h1>CAT FORTRESS 2</h1>
            
            <div class="selection-group">
                <h3>Select Map</h3>
                <div class="btn-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <button class="btn selected" onclick="setMap('GARDEN', this)">GARDEN (Classic)</button>
                    <button class="btn" onclick="setMap('KITCHEN', this)">KITCHEN (High Walls)</button>
                    <button class="btn" onclick="setMap('ROOFTOPS', this)">ROOFTOPS (Danger!)</button>
                </div>
            </div>

            <div class="selection-group">
                <h3>Select Game Mode</h3>
                <div class="btn-grid" style="grid-template-columns: repeat(2, 1fr);">
                    <button class="btn selected" onclick="setMode('CONTROL_POINT', this)">CONTROL POINT</button>
                    <button class="btn" onclick="setMode('DEATHMATCH', this)">DEATHMATCH</button>
                </div>
            </div>

            <div style="display:flex; gap:30px; justify-content:center;">
                <div class="selection-group" style="flex:1">
                    <h3 style="color:#ff4444">P1 Class (WASD+F/G)</h3>
                    <div class="btn-grid" id="p1-classes">
                        <button class="btn selected" onclick="selectClass(1, 'SCOUT')">SCOUT</button>
                        <button class="btn" onclick="selectClass(1, 'HEAVY')">HEAVY</button>
                        <button class="btn" onclick="selectClass(1, 'SNIPER')">SNIPER</button>
                        <button class="btn" onclick="selectClass(1, 'SOLDIER')">SOLDIER</button>
                    </div>
                </div>
                <div class="selection-group" style="flex:1">
                    <h3 style="color:#4444ff">P2 Class (Arrows+L/K)</h3>
                    <div class="btn-grid" id="p2-classes">
                        <button class="btn" onclick="selectClass(2, 'SCOUT')">SCOUT</button>
                        <button class="btn selected" onclick="selectClass(2, 'HEAVY')">HEAVY</button>
                        <button class="btn" onclick="selectClass(2, 'SNIPER')">SNIPER</button>
                        <button class="btn" onclick="selectClass(2, 'SOLDIER')">SOLDIER</button>
                    </div>
                </div>
            </div>

            <button class="start-btn" onclick="startGame()">START MEOW!</button>
        </div>
    </div>

    <div class="split-line"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Configuration ---
        const P1_COLOR = 0xff6600; 
        const P2_COLOR = 0x555555;

        const CLASSES = {
            SCOUT: { 
                hp: 100, speed: 0.45, 
                primary: { name: 'Milk Spray', damage: 12, reload: 250, range: 20, size: 0.15, speed: 1.2, count: 3 },
                melee: { name: 'Claws', damage: 35, reload: 400, range: 3 }
            },
            HEAVY: { 
                hp: 300, speed: 0.18, 
                primary: { name: 'Yarn Gatling', damage: 8, reload: 80, range: 40, size: 0.3, speed: 0.9, count: 1 },
                melee: { name: 'Big Paws', damage: 50, reload: 600, range: 3.5 }
            },
            SNIPER: { 
                hp: 125, speed: 0.28, 
                primary: { name: 'Precision Yarn', damage: 85, reload: 1800, range: 100, size: 0.1, speed: 3.0, count: 1 },
                melee: { name: 'Fish Bone', damage: 25, reload: 300, range: 3 }
            },
            SOLDIER: { 
                hp: 200, speed: 0.25, 
                primary: { name: 'Yarn Launcher', damage: 45, reload: 800, range: 50, size: 0.6, speed: 0.7, count: 1, splash: 5 },
                melee: { name: 'Scratch', damage: 40, reload: 500, range: 3 }
            }
        };

        const MAP_CONFIGS = {
            GARDEN: {
                floor: 0x556b2f,
                sky: 0x87ceeb,
                obstacles: [
                    { type: 'box', pos: [10, 1, 10], size: [3, 2, 3], color: 0x228b22 },
                    { type: 'box', pos: [-10, 1, -10], size: [3, 2, 3], color: 0x228b22 },
                    { type: 'box', pos: [15, 1, -5], size: [2, 2, 2], color: 0x8b4513 },
                    { type: 'box', pos: [-15, 1, 5], size: [2, 2, 2], color: 0x8b4513 },
                    { type: 'cylinder', pos: [0, 1.5, 15], size: [1, 1, 3], color: 0x8b4513 },
                    { type: 'cylinder', pos: [0, 1.5, -15], size: [1, 1, 3], color: 0x8b4513 }
                ]
            },
            KITCHEN: {
                floor: 0xcccccc,
                sky: 0x444444,
                obstacles: [
                    { type: 'box', pos: [0, 4, 15], size: [30, 8, 2], color: 0x888888 }, // Counter
                    { type: 'box', pos: [0, 4, -15], size: [30, 8, 2], color: 0x888888 },
                    { type: 'box', pos: [10, 1.5, 0], size: [4, 3, 4], color: 0xffffff }, // Fridge
                    { type: 'box', pos: [-10, 1, 0], size: [5, 2, 8], color: 0x5d4037 }  // Table
                ]
            },
            ROOFTOPS: {
                floor: 0x333333,
                sky: 0x000011,
                obstacles: [
                    { type: 'box', pos: [0, 10, 0], size: [10, 20, 10], color: 0x222222 },
                    { type: 'box', pos: [20, 2, 20], size: [10, 4, 10], color: 0x444444 },
                    { type: 'box', pos: [-20, 2, -20], size: [10, 4, 10], color: 0x444444 },
                    { type: 'box', pos: [20, 2, -20], size: [10, 4, 10], color: 0x444444 },
                    { type: 'box', pos: [-20, 2, 20], size: [10, 4, 10], color: 0x444444 }
                ]
            }
        };

        // --- State Variables ---
        let scene, renderer;
        let player1, player2;
        let p1Cam, p2Cam;
        let currentMap = 'GARDEN';
        let currentGameMode = 'CONTROL_POINT';
        let p1Class = 'SCOUT', p2Class = 'HEAVY';
        let gameRunning = false;
        let bullets = [];
        let obstacles = [];
        let capturePoint = { x: 0, z: 0, radius: 5, progress: 0, owner: null, mesh: null };
        let scores = { p1: 0, p2: 0 };
        let floatingTexts = [];
        let textureCache = {};
        
        // --- Real Audio System ---
        const audioCache = {};
        function playSound(name, volume = 0.4, loop = false) {
            const paths = {
                'SCOUT': 'sounds/shoot_scout.mp3',
                'HEAVY': 'sounds/shoot_heavy.mp3',
                'SNIPER': 'sounds/shoot_sniper.mp3',
                'SOLDIER': 'sounds/shoot_soldier.mp3',
                'melee': 'sounds/melee_slash.mp3',
                'hit': 'sounds/hit_impact.mp3',
                'death': 'sounds/death_meow.mp3',
                'capture': 'sounds/capture_progress.mp3',
                'win': 'sounds/win_music.mp3',
                'ambient': 'sounds/ambient_garden.mp3'
            };

            const path = paths[name] || name;
            if (!audioCache[path]) {
                audioCache[path] = new Audio(path);
            }

            if (loop) {
                audioCache[path].loop = true;
                audioCache[path].volume = volume;
                audioCache[path].play().catch(() => {});
            } else {
                // Clone for overlapping sounds (essential for rapid fire)
                const sound = audioCache[path].cloneNode();
                sound.volume = volume;
                sound.play().catch(() => {});
            }
        }

        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 0;

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        // --- Menu Functions ---
        window.setMap = (m, btn) => {
            currentMap = m;
            document.querySelectorAll('.btn-grid')[0].querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        };
        window.setMode = (m, btn) => {
            currentGameMode = m;
            document.querySelectorAll('.btn-grid')[1].querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        };
        window.selectClass = (p, c) => {
            if (p === 1) p1Class = c; else p2Class = c;
            const idx = p === 1 ? 2 : 3;
            document.querySelectorAll('.btn-grid')[idx].querySelectorAll('.btn').forEach(b => {
                b.classList.toggle('selected', b.innerText === c);
            });
        };

        window.startGame = () => {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('p1-hud').style.display = 'block';
            document.getElementById('p2-hud').style.display = 'block';
            gameRunning = true;
            initGame();
            playSound('ambient', 0.2, true); // Start background music
        };

        // --- Game Logic ---
        function initGame() {
            if (renderer) return;

            scene = new THREE.Scene();
            const config = MAP_CONFIGS[currentMap];
            scene.background = new THREE.Color(config.sky);
            if (currentMap === 'ROOFTOPS') scene.fog = new THREE.FogExp2(config.sky, 0.02);

            // OPTIMIZATION: Shadows DISABLED for 60 FPS
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(15, 30, 10);
            scene.add(sun);

            // Environment
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshPhongMaterial({ color: config.floor });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.matrixAutoUpdate = false; // Static
            ground.updateMatrix();
            scene.add(ground);

            // Build Map
            obstacles = [];
            config.obstacles.forEach(obj => {
                let geo;
                if (obj.type === 'box') geo = new THREE.BoxGeometry(...obj.size);
                else geo = new THREE.CylinderGeometry(obj.size[0], obj.size[1], obj.size[2], 8); 

                const mesh = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({ color: obj.color }));
                mesh.position.set(...obj.pos);
                mesh.matrixAutoUpdate = false; // Static
                mesh.updateMatrix();
                scene.add(mesh);

                mesh.geometry.computeBoundingBox();
                const box = new THREE.Box3().setFromObject(mesh);
                obstacles.push(box);
            });
            // Capture Point
            if (currentGameMode === 'CONTROL_POINT') {
                const bowlGeo = new THREE.CylinderGeometry(capturePoint.radius, capturePoint.radius, 0.2, 16);
                const bowlMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.4, emissive: 0x222222 });
                capturePoint.mesh = new THREE.Mesh(bowlGeo, bowlMat);
                capturePoint.mesh.position.y = 0.1;
                scene.add(capturePoint.mesh);
                document.getElementById('game-info').innerText = "Objective: Capture the Milk Bowl!";
            } else {
                document.getElementById('game-info').innerText = "Objective: Deathmatch - Get 10 Kills!";
            }

            // Players
            player1 = createCat(P1_COLOR, new THREE.Vector3(-15, 0, 0));
            player2 = createCat(P2_COLOR, new THREE.Vector3(15, 0, 0));
            player2.rotation.y = Math.PI;
            scene.add(player1);
            scene.add(player2);

            applyClass(player1, p1Class);
            applyClass(player2, p2Class);

            p1Cam = new THREE.PerspectiveCamera(75, (window.innerWidth/2) / window.innerHeight, 0.5, 200); // Tighter frustum
            p2Cam = new THREE.PerspectiveCamera(75, (window.innerWidth/2) / window.innerHeight, 0.5, 200);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createCat(color, pos) {
            const group = new THREE.Group();
            const mat = new THREE.MeshPhongMaterial({ color: color });
            
            // Body
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1, 1.8), mat);
            body.position.y = 0.8;
            group.add(body);

            // Head
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.9, 0.9), mat);
            head.position.set(0, 1.4, 0.7);
            group.add(head);

            // Ears
            const earGeo = new THREE.ConeGeometry(0.2, 0.4, 3);
            const earL = new THREE.Mesh(earGeo, mat);
            earL.position.set(0.25, 2.0, 0.7);
            group.add(earL);
            const earR = earL.clone();
            earR.position.x = -0.25;
            group.add(earR);

            // Tail
            const tail = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1), mat);
            tail.position.set(0, 1.0, -1.2);
            tail.rotation.x = 0.5;
            group.add(tail);

            group.position.copy(pos);
            group.userData = { 
                hp: 100, maxHp: 100, lastShot: 0, 
                currentWeapon: 'primary',
                velocity: new THREE.Vector3(),
                knockback: new THREE.Vector3(),
                shake: 0,
                box: new THREE.Box3()
            };
            return group;
        }

        function applyClass(player, className) {
            const stats = CLASSES[className];
            player.userData.class = className;
            player.userData.hp = stats.hp;
            player.userData.maxHp = stats.hp;
            
            const prefix = player === player1 ? 'p1' : 'p2';
            document.getElementById(`${prefix}-class-name`).innerText = className;
            updateHUD(player);
        }

        function updateHUD(player) {
            const prefix = player === player1 ? 'p1' : 'p2';
            const percent = (player.userData.hp / player.userData.maxHp) * 100;
            const bar = document.getElementById(`${prefix}-hp-bar`);
            bar.style.width = `${Math.max(0, percent)}%`;
            
            // Color feedback based on health
            if (percent > 60) bar.style.background = 'linear-gradient(90deg, #44ff44, #88ff88)';
            else if (percent > 30) bar.style.background = 'linear-gradient(90deg, #ffff44, #ffff88)';
            else bar.style.background = 'linear-gradient(90deg, #ff4444, #ff8888)';

            const stats = CLASSES[player.userData.class];
            const weapon = stats[player.userData.currentWeapon];
            document.getElementById(`${prefix}-weapon`).innerText = weapon.name;
            document.getElementById(`${prefix}-score`).innerText = scores[prefix];
        }

        function spawnOnomatopoeia(text, pos, color = 0xffffff) {
            const key = `${text}-${color}`;
            let texture;
            
            if (textureCache[key]) {
                texture = textureCache[key];
            } else {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 128;
                
                ctx.font = 'bold 72px "Impact", "Segoe UI"'; // Bigger, better font
                ctx.fillStyle = '#' + new THREE.Color(color).getHexString();
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 6;
                ctx.textAlign = 'center';
                ctx.strokeText(text, 128, 80);
                ctx.fillText(text, 128, 80);

                texture = new THREE.CanvasTexture(canvas);
                textureCache[key] = texture;
            }

            const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
            const sprite = new THREE.Sprite(mat);
            
            // RANDOM OFFSET so they don't overlap
            sprite.position.copy(pos).add(new THREE.Vector3(
                (Math.random() - 0.5) * 1.5, 
                2 + (Math.random() - 0.5) * 0.5, 
                (Math.random() - 0.5) * 1.5
            ));
            sprite.scale.set(3, 1.5, 1);
            
            scene.add(sprite);
            // DRIFT: Random direction for floating
            floatingTexts.push({ 
                sprite, 
                life: 1.0, 
                vel: new THREE.Vector3((Math.random()-0.5)*0.05, 0.04 + Math.random()*0.02, (Math.random()-0.5)*0.05) 
            });
        }

        function updateOnomatopoeias() {
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i];
                ft.life -= 0.025;
                ft.sprite.position.add(ft.vel); // Drift in random direction
                ft.sprite.material.opacity = ft.life;
                
                if (ft.life <= 0) {
                    scene.remove(ft.sprite);
                    floatingTexts.splice(i, 1);
                }
            }
        }

        const p1BulletMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
        const p2BulletMat = new THREE.MeshBasicMaterial({ color: 0x4444ff });
        const projectileBox = new THREE.Box3(); 
        let muzzleFlash; // Global light pool

        function shoot(player) {
            const stats = CLASSES[player.userData.class];
            const weapon = stats[player.userData.currentWeapon];
            const now = Date.now();
            
            if (now - player.userData.lastShot < weapon.reload) return;
            player.userData.lastShot = now;

            // Screen shake for shooter
            player.userData.shake = weapon.damage * 0.05;

            // REAL SOUNDS
            if (player.userData.currentWeapon === 'melee') {
                playSound('melee');
                spawnOnomatopoeia("SLASH!", player.position, 0xcccccc);
                checkMeleeHit(player, weapon);
                return;
            } else {
                playSound(player.userData.class);
                let soundName = "PEW!";
                if (player.userData.class === 'SNIPER') soundName = "BOOM!";
                if (player.userData.class === 'HEAVY') soundName = "RAT-TAT!";
                if (player.userData.class === 'SOLDIER') soundName = "KABLAM!";
                spawnOnomatopoeia(soundName, player.position, player === player1 ? 0xffaa00 : 0xcccccc);
            }

            // Procedural Muzzle Flash (Reusable)
            if (!muzzleFlash) {
                muzzleFlash = new THREE.PointLight(0xffcc00, 3, 5);
                scene.add(muzzleFlash);
            }
            muzzleFlash.position.copy(player.position).add(new THREE.Vector3(0, 1.2, 1).applyQuaternion(player.quaternion));
            muzzleFlash.intensity = 3;
            setTimeout(() => { if(muzzleFlash) muzzleFlash.intensity = 0; }, 50);

            for(let i=0; i < (weapon.count || 1); i++) {
                const yarn = new THREE.Mesh(
                    new THREE.SphereGeometry(weapon.size, 5, 5), // Even lower segments
                    player === player1 ? p1BulletMat : p2BulletMat
                );
                yarn.castShadow = false; // Bullets don't need shadows!
                yarn.receiveShadow = false;
                yarn.position.copy(player.position).add(new THREE.Vector3(0, 1.2, 0.5).applyQuaternion(player.quaternion));
                
                const dir = new THREE.Vector3(0, 0, 1).applyQuaternion(player.quaternion);
                if (weapon.count > 1) {
                    dir.x += (Math.random() - 0.5) * 0.2;
                    dir.y += (Math.random() - 0.5) * 0.2;
                }

                bullets.push({
                    mesh: yarn,
                    dir: dir,
                    owner: player,
                    weapon: weapon,
                    birth: now
                });
                scene.add(yarn);
            }
        }

        function checkMeleeHit(player, weapon) {
            const target = player === player1 ? player2 : player1;
            const dist = player.position.distanceTo(target.position);
            if (dist < weapon.range) {
                target.userData.hp -= weapon.damage;
                spawnHitEffect(target.position);
                if (target.userData.hp <= 0) handleKill(player, target);
                updateHUD(target);
            }
        }

        function spawnHitEffect(pos) {
            const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for(let i=0; i<5; i++) {
                const p = new THREE.Mesh(geo, mat);
                p.position.copy(pos).add(new THREE.Vector3(Math.random()-0.5, 1, Math.random()-0.5));
                scene.add(p);
                setTimeout(() => scene.remove(p), 200);
            }
        }

        function handleKill(attacker, victim) {
            const prefix = attacker === player1 ? 'p1' : 'p2';
            scores[prefix]++;
            spawnOnomatopoeia("MEOW!", victim.position, 0xff0000); 
            playSound('death');
            
            if (currentGameMode === 'DEATHMATCH' && scores[prefix] >= 10) {
                playSound('win');
                alert(`PLAYER ${prefix === 'p1' ? '1' : '2'} WINS!`);
                location.reload();
            }
            respawn(victim);
        }

        function respawn(player) {
            const stats = CLASSES[player.userData.class];
            player.userData.hp = stats.hp;
            const spawnX = player === player1 ? -20 : 20;
            player.position.set(spawnX, 0, (Math.random()-0.5)*20);
            updateHUD(player);
        }

        function updatePlayers() {
            if (!gameRunning) return;

            [player1, player2].forEach(p => {
                const prefix = p === player1 ? 'p1' : 'p2';
                const stats = CLASSES[p.userData.class];
                const moveSpeed = stats.speed;
                
                let moveZ = 0;
                
                // P1 Controls
                if (p === player1) {
                    if (keys['KeyW']) moveZ += moveSpeed;
                    if (keys['KeyS']) moveZ -= moveSpeed;
                    if (keys['KeyA']) p.rotation.y += 0.06;
                    if (keys['KeyD']) p.rotation.y -= 0.06;
                    if (keys['KeyF']) shoot(p);
                    if (keys['KeyG']) p.userData.currentWeapon = p.userData.currentWeapon === 'primary' ? 'melee' : 'primary';
                } 
                // P2 Controls
                else {
                    if (keys['ArrowUp']) moveZ += moveSpeed;
                    if (keys['ArrowDown']) moveZ -= moveSpeed;
                    if (keys['ArrowLeft']) p.rotation.y += 0.06;
                    if (keys['ArrowRight']) p.rotation.y -= 0.06;
                    if (keys['KeyL']) shoot(p);
                    if (keys['KeyK']) p.userData.currentWeapon = p.userData.currentWeapon === 'primary' ? 'melee' : 'primary';
                }

                // Apply Movement + Knockback
                if (moveZ !== 0 || p.userData.knockback.length() > 0.01) {
                    const oldPos = p.position.clone();
                    
                    // Normal movement
                    p.translateZ(moveZ);
                    
                    // Knockback decay and application
                    p.position.add(p.userData.knockback);
                    p.userData.knockback.multiplyScalar(0.9); // Friction

                    // Collision check
                    p.userData.box.setFromObject(p);
                    let collided = false;
                    for(let box of obstacles) {
                        if (p.userData.box.intersectsBox(box)) {
                            collided = true;
                            break;
                        }
                    }
                    if (collided) p.position.copy(oldPos);

                    // Animation bobbing
                    p.children[0].position.y = 0.8 + Math.sin(Date.now() * 0.01) * 0.1;
                }

                // Decay screen shake
                if (p.userData.shake > 0) p.userData.shake *= 0.9;

                if (currentMap === 'ROOFTOPS' && p.position.y < -5) respawn(p);
                
                updateHUD(p);
            });

            updateCamera(p1Cam, player1);
            updateCamera(p2Cam, player2);
        }

        function updateCamera(cam, player) {
            const offset = new THREE.Vector3(0, 4, -8);
            offset.applyQuaternion(player.quaternion);
            
            const targetPos = player.position.clone().add(offset);
            
            // Apply Screen Shake
            if (player.userData.shake > 0.01) {
                targetPos.x += (Math.random() - 0.5) * player.userData.shake;
                targetPos.y += (Math.random() - 0.5) * player.userData.shake;
                targetPos.z += (Math.random() - 0.5) * player.userData.shake;
            }

            cam.position.lerp(targetPos, 0.1);
            cam.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
        }

        function updateBullets() {
            const now = Date.now();
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.mesh.position.addScaledVector(b.dir, b.weapon.speed);
                b.mesh.updateMatrixWorld();

                let hitObstacle = false;
                
                // Optimized collision
                projectileBox.setFromObject(b.mesh);
                for(let box of obstacles) {
                    if (projectileBox.intersectsBox(box)) {
                        hitObstacle = true;
                        break;
                    }
                }

                const target = b.owner === player1 ? player2 : player1;
                // SQUARED distance is much faster than standard distance
                const dx = b.mesh.position.x - target.position.x;
                const dz = b.mesh.position.z - target.position.z;
                const distSq = dx*dx + dz*dz;
                
                if (distSq < 2.5 || hitObstacle) { // 1.6^2 is approx 2.56
                    if (distSq < 2.5) {
                        target.userData.hp -= b.weapon.damage;
                        const kbDir = b.dir.clone().multiplyScalar(b.weapon.damage * 0.015);
                        target.userData.knockback.add(kbDir);
                        target.userData.shake = b.weapon.damage * 0.1;

                        playSound('hit', 0.3); // Sound on hit
                        spawnHitEffect(target.position);
                        if (target.userData.hp <= 0) handleKill(b.owner, target);
                        updateHUD(target);
                    }
                    removeBullet(i);
                    continue;
                }

                if (now - b.birth > 2500) removeBullet(i);
            }
        }

        function removeBullet(idx) {
            scene.remove(bullets[idx].mesh);
            bullets.splice(idx, 1);
        }

        function updateCapture() {
            if (currentGameMode !== 'CONTROL_POINT') return;

            const p1In = player1.position.distanceTo(new THREE.Vector3(0,0,0)) < capturePoint.radius;
            const p2In = player2.position.distanceTo(new THREE.Vector3(0,0,0)) < capturePoint.radius;
            const statusEl = document.getElementById('game-info');

            if (p1In && !p2In) {
                capturePoint.progress = Math.min(1, capturePoint.progress + 0.005);
                if (capturePoint.progress >= 1) {
                    capturePoint.owner = 'Ginger';
                    capturePoint.mesh.material.emissive.setHex(0xff4444);
                }
            } else if (p2In && !p1In) {
                capturePoint.progress = Math.max(-1, capturePoint.progress - 0.005);
                if (capturePoint.progress <= -1) {
                    capturePoint.owner = 'Tabby';
                    capturePoint.mesh.material.emissive.setHex(0x4444ff);
                }
            }

            if (capturePoint.owner) {
                statusEl.innerText = `Point Captured by ${capturePoint.owner === 'Ginger' ? 'P1' : 'P2'}!`;
                statusEl.style.color = capturePoint.owner === 'Ginger' ? '#ff4444' : '#4444ff';
            } else {
                const p = Math.abs(Math.round(capturePoint.progress * 100));
                statusEl.innerText = `Capture Progress: ${p}% (${capturePoint.progress > 0 ? 'P1' : 'P2'})`;
            }
        }

        function onWindowResize() {
            if (!p1Cam || !p2Cam || !renderer) return;
            p1Cam.aspect = (window.innerWidth / 2) / window.innerHeight;
            p1Cam.updateProjectionMatrix();
            p2Cam.aspect = (window.innerWidth / 2) / window.innerHeight;
            p2Cam.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            if (!gameRunning) return;
            requestAnimationFrame(animate);
            
            // FPS Counter Logic
            const now = performance.now();
            frameCount++;
            if (now >= lastTime + 1000) {
                fps = Math.round((frameCount * 1000) / (now - lastTime));
                document.getElementById('fps-counter').innerText = `FPS: ${fps}`;
                frameCount = 0;
                lastTime = now;
            }

            updatePlayers();
            updateBullets();
            updateCapture();
            updateOnomatopoeias();

            renderer.setScissorTest(true);

            renderer.setViewport(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(0, 0, window.innerWidth / 2, window.innerHeight);
            renderer.render(scene, p1Cam);

            renderer.setViewport(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.setScissor(window.innerWidth / 2, 0, window.innerWidth / 2, window.innerHeight);
            renderer.render(scene, p2Cam);
        }
    </script>
</body>
</html>
